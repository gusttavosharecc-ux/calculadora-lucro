<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Lucro Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>📊 Calculadora de Lucro</h2>
        <label>Custo do Produto (R$)</label>
        <input type="number" id="custo" placeholder="Ex: 50.00">
        
        <label>Preço de Venda (R$)</label>
        <input type="number" id="venda" placeholder="Ex: 100.00">
        
        <button onclick="calcular()">Calcular Resultado</button>
        
        <div id="resultado" class="hidden">
            <p id="lucroBruto"></p>
            <p id="margem"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
